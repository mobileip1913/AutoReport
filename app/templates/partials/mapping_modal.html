<!-- 日报字段配置弹窗（mapping_modal.js） -->
<div id="mappingModal"
  class="app-modal hidden opacity-0"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modalTitle"
  aria-hidden="true">
  <div class="app-modal__backdrop" data-modal-close></div>
  <div id="mappingPanel" class="app-modal__panel app-modal__panel--wide">
    <header class="app-modal__header">
      <div class="app-modal__header-main min-w-0">
        <button type="button" id="modalBackLink" class="hidden text-xs text-link mb-1 block text-left w-full">← 返回</button>
        <h2 id="modalTitle" class="app-modal__title">配置日报字段</h2>
        <p id="modalSubtitle" class="app-modal__subtitle truncate"></p>
      </div>
      <button type="button" class="app-modal__close" data-modal-close aria-label="关闭">&times;</button>
    </header>
    <div class="app-modal__body">
      <div id="newMappingFields" class="hidden grid md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="modal-field-label">绑定店铺</label>
          <select id="newDataSource" class="modal-input">
            {% if modal_stores %}
            {% for store in modal_stores %}
            <option value="{{ store.data_source_id }}" data-store-id="{{ store.id }}">{{ store.name }} · {{ store.platform }}</option>
            {% endfor %}
            {% else %}
            {% for ds in modal_data_sources %}
            <option value="{{ ds.id }}">{{ ds.name }}</option>
            {% endfor %}
            {% endif %}
          </select>
        </div>
        <div>
          <label class="modal-field-label">关联逻辑字段（可选）</label>
          <select id="newLogicalField" class="modal-input">
            <option value="">不关联</option>
            {% for f in modal_fields %}
            <option value="{{ f.id }}">{{ f.name }} ({{ f.code }})</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="grid md:grid-cols-3 gap-3 mb-4">
        <div>
          <label class="modal-field-label" for="mappingLabel">指标名称</label>
          <input id="mappingLabel" type="text" class="modal-input" placeholder="如：实际支付金额">
        </div>
        <div>
          <label class="modal-field-label" for="mappingGroup">分组</label>
          <input id="mappingGroup" type="text" class="modal-input" placeholder="如：订单情况">
        </div>
        <div>
          <label class="modal-field-label" for="mappingSort">排序</label>
          <input id="mappingSort" type="number" class="modal-input font-mono tabular-nums" value="0">
        </div>
      </div>
      <div class="mapping-tabs" role="tablist" aria-label="取数方式">
        <button type="button" class="mapping-tab" role="tab" data-tab="placeholder">占位</button>
        <button type="button" class="mapping-tab" role="tab" data-tab="per_order">每单金额</button>
        <button type="button" class="mapping-tab" role="tab" data-tab="ratio">按比例</button>
        <button type="button" class="mapping-tab is-active" role="tab" data-tab="fetch">计算</button>
        <button type="button" class="mapping-tab" role="tab" data-tab="reuse">复用</button>
      </div>

      <div class="mapping-tab-panel hidden" data-panel="placeholder">
        <div class="placeholder-config">
          <p class="text-sm text-slate-600">该字段为<strong>占位</strong>项：出报时留空，导出后由财务手工填写或上传文件。无需其它配置。</p>
        </div>
      </div>

      <div class="mapping-tab-panel hidden" data-panel="per_order">
        <div class="per-order-config">
          <label class="modal-field-label" for="perOrderAmount">每单金额</label>
          <div class="per-order-input">
            <input id="perOrderAmount" type="number" step="0.01" min="0" class="modal-input font-mono tabular-nums" value="1">
            <span class="per-order-unit">元 / 单</span>
          </div>
          <label class="modal-field-label mt-3" for="perOrderBasis">单数口径</label>
          <select id="perOrderBasis" class="modal-input max-w-[16rem]">
            <option value="valid_orders">当日有效订单数（下单口径：非样品/非刷单）</option>
            <option value="review_orders">刷单单数（不重复 Order ID）</option>
          </select>
          <p class="modal-section-hint mt-2">出报时 = 每单金额 × 上述单数，不改动原始导入数据。</p>
        </div>
      </div>

      <div class="mapping-tab-panel hidden" data-panel="ratio">
        <div class="per-order-config">
          <label class="modal-field-label" for="ratioBase">基准字段（取其值）</label>
          <div class="max-w-[22rem]"><div id="ratioBaseHost"></div></div>
          <label class="modal-field-label mt-3" for="ratioPercent">比例</label>
          <div class="per-order-input">
            <input id="ratioPercent" type="number" step="0.01" min="0" class="modal-input font-mono tabular-nums" value="100">
            <span class="per-order-unit">%</span>
          </div>
          <p class="modal-section-hint mt-2">出报时 = 基准字段的值 × 比例%，例如「应收金额 × 30%」。</p>
        </div>
      </div>

      <div id="partsRegion" class="mapping-parts-region">
        <div class="mb-2">
          <h3 class="modal-section-title" id="partsRegionTitle">取数规则</h3>
          <p class="modal-section-hint" id="partsRegionHint">支持多来源组与组内多列加减合并</p>
        </div>
        <div id="partsContainer" class="space-y-3"></div>
        <div class="mt-3">
          <button type="button" id="btnAddPart" class="btn-dashed-add w-full">+ 添加来源组</button>
          <button type="button" id="btnAddFieldRef" class="btn-dashed-add btn-dashed-add--alt w-full hidden">+ 添加复用字段</button>
        </div>
      </div>
    </div>
    <footer class="app-modal__footer">
      <button type="button" id="btnDeleteMapping" class="hidden btn-modal-danger">删除</button>
      <div class="app-modal__footer-actions">
        <button type="button" class="btn-modal-cancel" data-modal-close>取消</button>
        <button type="button" id="btnSaveMapping" class="btn-primary">保存</button>
      </div>
    </footer>
  </div>
</div>
