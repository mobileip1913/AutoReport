<!-- 刷单设置弹窗：Excel 导入金额/佣金/服务费/成本；仅物流费可设每单固定值 -->
<div id="reviewSettingsModal"
  class="app-modal hidden opacity-0"
  role="dialog"
  aria-modal="true"
  aria-labelledby="reviewSettingsTitle"
  aria-hidden="true">
  <div class="app-modal__backdrop" data-close-review-settings data-modal-close></div>
  <div id="reviewSettingsPanel" class="app-modal__panel app-modal__panel--narrow">
    <header class="app-modal__header">
      <div class="app-modal__header-main">
        <h2 id="reviewSettingsTitle" class="app-modal__title">刷单设置</h2>
        <p class="app-modal__subtitle">刷单金额、佣金、服务费、成本请导入 Excel；本弹窗仅物流费可设置每单固定金额</p>
      </div>
      <button type="button" class="app-modal__close" data-close-review-settings data-modal-close aria-label="关闭">&times;</button>
    </header>
    <div class="app-modal__body space-y-5">
      <section>
        <h3 class="modal-section-title">刷单数据 · Excel 导入</h3>
        <p class="modal-section-hint mt-1">模板列：Order ID、SKU ID、刷单金额、刷单佣金、刷单服务费、刷单成本（不含物流费）。导入后立即生效并覆盖本店已有清单。</p>
        <div class="flex flex-wrap items-center gap-2 mt-3">
          <button type="button" class="review-template-link btn-modal-cancel">下载模板</button>
          <label class="btn-modal-cancel cursor-pointer">
            导入刷单 Excel
            <input type="file" class="review-import-input hidden" accept=".xlsx">
          </label>
        </div>
        <p class="review-import-hint text-xs mt-2 hidden"></p>
        <p class="text-xs text-slate-500 mt-2">当前 <span class="review-stat-rows font-medium text-slate-700 tabular-nums">0</span> 行 · <span class="review-stat-orders font-medium text-slate-700 tabular-nums">0</span> 个刷单订单</p>
      </section>
      <section class="border-t border-slate-100 pt-4 review-logistics-section">
        <div class="flex flex-wrap items-center gap-2">
          <h3 class="modal-section-title">刷单物流费用 · 每单固定</h3>
          <span class="review-only-manual-tag">仅此可手动设置</span>
        </div>
        <p class="modal-section-hint mt-1">不重复刷单 Order ID 数 × 下方每单金额；与 Excel 中的金额列无关</p>
        <div class="flex flex-wrap items-center gap-2 mt-3">
          <label class="modal-field-label shrink-0 mb-0" for="reviewLogisticsPerOrder">每单金额</label>
          <div class="flex items-center gap-2">
            <input type="number" id="reviewLogisticsPerOrder" class="review-logistics-per-order form-control form-control--md w-24 tabular-nums" min="0" step="0.01" value="1">
            <span class="text-sm text-slate-500">元 / 单</span>
          </div>
        </div>
        <label class="inline-flex items-center gap-1.5 text-sm text-slate-600 cursor-pointer mt-3"
          title="当日下单且当日退款的刷单订单不计入物流费单数">
          <input type="checkbox" class="review-logistics-exclude-same-day-refund rounded border-slate-300" checked>
          排除当日退单
        </label>
        <p class="review-logistics-modal-summary text-xs text-slate-600 mt-2"></p>
      </section>
    </div>
    <footer class="app-modal__footer app-modal__footer--end">
      <div class="app-modal__footer-actions">
        <button type="button" class="btn-modal-cancel" data-close-review-settings data-modal-close>取消</button>
        <button type="button" class="btn-save-review-settings btn-primary">保存物流费设置</button>
      </div>
    </footer>
  </div>
</div>
