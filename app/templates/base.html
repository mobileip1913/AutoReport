<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AutoReport{% endblock %}</title>
  <link rel="stylesheet" href="/static/tailwind.css">
  <link rel="stylesheet" href="/static/style.css?v=20260709o">
</head>
<body class="min-h-screen">
  {% set path = request.url.path %}
  <nav class="app-nav">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
      <a href="/" class="app-nav-brand shrink-0">AutoReport</a>
      <div class="app-nav-links ml-auto">
        <a href="/" class="app-nav-link {% if path == '/' %}is-active{% endif %}">概览</a>
        <a href="/mappings" class="app-nav-link {% if path.startswith('/mappings') %}is-active{% endif %}">报表配置</a>
        <a href="/daily" class="app-nav-link {% if path.startswith('/daily') %}is-active{% endif %}">日报输出</a>
      </div>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
