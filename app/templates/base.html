<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AutoReport{% endblock %}</title>
  <link rel="stylesheet" href="/static/tailwind.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <nav class="bg-indigo-700 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-xl font-bold tracking-tight">AutoReport</a>
      <div class="flex gap-4 text-sm">
        <a href="/" class="hover:text-indigo-200">概览</a>
        <a href="/templates" class="hover:text-indigo-200">报表模板</a>
        <a href="/mappings" class="hover:text-indigo-200">字段映射</a>
        <a href="/imports" class="hover:text-indigo-200">数据导入</a>
        <a href="/daily" class="hover:text-indigo-200 font-semibold text-amber-300">日报输出</a>
        <a href="/reports" class="hover:text-indigo-200">报表输出</a>
        <a href="/logs" class="hover:text-indigo-200">映射日志</a>
      </div>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
